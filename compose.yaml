x-app-base: &app-base
  build:
    context: sample-app
  image: sample-app:latest
  deploy:
    resources:
      limits:
        memory: 200M
  restart: unless-stopped
  env_file:
    - env.txt
  depends_on:
    - db
    - otel-collector
    - product-info-api
  networks:
    - apm-demo
  volumes:
    - app-demo-logs:/app/log
  logging:
    driver: "json-file"
    options:
      max-size: "2m"
      max-file: "1"

services:
  prepare:
    image: sample-app:latest
    deploy:
      resources:
        limits:
          memory: 1024M
    depends_on:
      - db
    networks:
      - apm-demo
    environment:
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: mysql
      DATABASE_HOST: db
    command: "/bin/true"

  app00:
    <<: *app-base
    container_name: sample-app00
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: mysql
      DATABASE_HOST: db
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4319"
      OTEL_SERVICE_NAME: "otel-sample-app"
      SERVICE_VERSION: "v0.1"
      ENVIRONMENT_NAME: "production"
      PRODUCT_INFO_API_HOST: "product-info-api"
    command: ["/bin/sh", "-c", "rm -f tmp/pids/server.pid; bin/rails server -p 3000 -b 0.0.0.0"]

  app01:
    <<: *app-base
    container_name: sample-app01
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: mysql
      DATABASE_HOST: db
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4319"
      OTEL_SERVICE_NAME: "otel-sample-app"
      SERVICE_VERSION: "v1.0"
      ENVIRONMENT_NAME: "production"
      PRODUCT_INFO_API_HOST: "product-info-api"
    command: ["/bin/sh", "-c", "rm -f tmp/pids/server.pid; bin/rails server -p 3000 -b 0.0.0.0"]

  app02:
    <<: *app-base
    container_name: sample-app02
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      - db
      - otel-collector
      - product-info-api
      - fluentd
    environment:
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: mysql
      DATABASE_HOST: db
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4319"
      OTEL_SERVICE_NAME: "otel-sample-app"
      SERVICE_VERSION: "v2.0"
      ENVIRONMENT_NAME: "production"
      PRODUCT_INFO_API_HOST: "product-info-api"
      LOG_TO_STDOUT: "1"
    logging:
      driver: "fluentd"
      options:
        fluentd-address: "localhost:24224"
        tag: "app02"
        fluentd-async: "true"
    command: ["/bin/sh", "-c", "rm -f tmp/pids/server.pid; bin/rails server -p 3000 -b 0.0.0.0"]

  app03:
    <<: *app-base
    container_name: sample-app03
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: mysql
      DATABASE_HOST: db
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4319"
      OTEL_SERVICE_NAME: "otel-sample-app"
      SERVICE_VERSION: "v3.0"
      ENVIRONMENT_NAME: "staging"
      PRODUCT_INFO_API_HOST: "product-info-api"
    command: ["/bin/sh", "-c", "rm -f tmp/pids/server.pid; bin/rails server -p 3000 -b 0.0.0.0"]

  product-info-api:
    container_name: product-info-api
    build:
      context: product-info-api
    image: product-info-api:latest
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    depends_on:
      - otel-collector
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4319"
      OTEL_SERVICE_NAME: "product-info-api"
      OTEL_RESOURCE_ATTRIBUTES: "service.namespace=apm-demo"
    networks:
      - apm-demo
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "1"

  db:
    container_name: sample-db
    image: public.ecr.aws/docker/library/mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: mysql
    networks:
      - apm-demo
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "1"

  otel-collector:
    container_name: sample-otel-collector
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.155.0
    # ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
      - app-demo-logs:/app/log
    ports:
      - 127.0.0.1:4319:4319
    env_file:
      - env.txt
    networks:
      - apm-demo
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "1"

  fluentd:
    container_name: sample-fluentd
    image: public.ecr.aws/docker/library/fluentd:v1.18-1
    volumes:
      - ./fluentd/fluent.conf:/fluentd/etc/fluent.conf
    ports:
      - "127.0.0.1:24224:24224"
      - "127.0.0.1:24224:24224/udp"
    networks:
      - apm-demo
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "1"

  locust:
    container_name: locust
    build:
      context: locust
    depends_on:
      - app00
      - app01
      - app02
      - app03
    volumes:
      - ./locust/locustfile.py:/home/locust/locustfile.py
    command: --headless -u 12 --loglevel ERROR
    environment:
      - DISABLE_PLAYWRIGHT
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4319
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=locust
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=apm-demo
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
    networks:
      - apm-demo
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "1"

volumes:
  app-demo-logs:

networks:
  apm-demo:
